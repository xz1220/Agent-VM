version: "1"
active:
  kind: profile
  name: backend-coder
defaults:
  source_scope: global
  targets:
    - claude-code
    - codex
    - cline
  conflict_strategy: prompt
settings:
  backup_enabled: true
  backup_max_count: 10
  write_mode: managed-only
  shell_prompt:
    enabled: true
    format: "avm:%s"
