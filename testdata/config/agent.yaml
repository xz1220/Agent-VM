name: backend-coder
description: Backend implementation agent
version: "1.0.0"
source_scope: global
runtime:
  preferred: codex
  kind: local
  mode: primary
  fallback:
    - claude-code
identity:
  display_name: Backend Coder
  role: implementation
  tags:
    - backend
    - coding
instructions:
  system: |
    You implement backend changes with tests.
  developer: |
    Prefer small, reviewable changes.
  references:
    - memory/project/backend-standards.md
model_run:
  model: gpt-5.4
  reasoning_effort: medium
  verbosity: normal
  temperature: 0
io_contract:
  input_modes:
    - text
    - files
  output_style: concise
  language: zh-CN
capabilities:
  skills:
    - git
    - test
    - review
  mcps:
    - github
    - postgres
  toolsets:
    browser: disabled
    shell: limited
permissions:
  approval: on-request
  sandbox: workspace-write
  allow:
    - "Bash(git *)"
  deny:
    - "Bash(rm -rf *)"
memory_refs:
  - id: backend-standards
    scope: project
    path: ~/.avm/memory/project/backend-standards.md
    mode: read
runtime_extensions:
  claude-code:
    agent_type: primary
  codex:
    profile: avm-backend-coder
