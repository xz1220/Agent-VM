name: Bug report
description: Report a reproducible AVM bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands and minimal config needed to reproduce.
      placeholder: |
        go run ./cmd/avm ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main@<sha>
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, zsh, Go 1.23
