name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - run: make build-ui
      - run: |
          set -eu
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for target in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            asset_arch="$arch"
            if [ "$arch" = "amd64" ]; then
              asset_arch="x86_64"
            fi
            work="dist/avm_${os}_${asset_arch}"
            mkdir -p "$work"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${build_date}" -o "$work/avm" ./cmd/avm
            cp ui/dist/avm-ui.js "$work/avm-ui"
            chmod +x "$work/avm-ui"
            tar -C "$work" -czf "dist/avm_${os}_${asset_arch}.tar.gz" avm avm-ui
          done
          cd dist
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
