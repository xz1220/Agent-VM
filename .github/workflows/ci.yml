name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - run: go build ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
      - run: go test ./...
      - run: make build-ui
      - run: |
          set -eu
          home="$(mktemp -d)"
          AVM_INSTALL_SOURCE_DIR="$PWD" \
            AVM_INSTALL_UI=0 \
            AVM_INSTALL_DIR="$home/bin" \
            AVM_INSTALL_SHELL_INTEGRATION=0 \
            HOME="$home" \
            scripts/install.sh
          "$home/bin/avm" --version
          "$home/bin/avm" setup --no-capabilities
