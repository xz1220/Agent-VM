name: backend-coder
description: Backend implementation agent
version: "1.0.0"
source_scope: global

runtime:
  preferred: codex
  kind: local
  mode: primary
  fallback:
    - claude-code

identity:
  display_name: Backend Coder
  role: implementation
  tags:
    - backend
    - coding

instructions:
  system: |
    You implement backend changes with tests.
  developer: |
    Prefer small, reviewable changes.
  references:
    - docs/backend-standards.md

model_run:
  model: gpt-5.4
  reasoning_effort: medium
  verbosity: normal
  temperature: 0

io_contract:
  input_modes:
    - text
    - files
  output_style: concise
  language: en-US

capabilities:
  skills:
    - test
  mcps:
    - github
  commands: []
  hooks: []
  toolsets:
    shell: limited
    browser: disabled

permissions:
  approval: on-request
  sandbox: workspace-write
  allow:
    - "Bash(go test ./...)"
    - "Bash(git status --short)"
  deny:
    - "Bash(rm -rf *)"
  additional_directories: []

lifecycle_hooks:
  before_run: []
  after_run: []

runtime_extensions:
  claude-code: {}
  codex: {}
  cline: {}
  cursor: {}
  openclaw: {}
